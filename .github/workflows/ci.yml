name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    permissions:
      packages: write  # Required for NuGet push
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ninja-build \
          clang \
          libc++-dev \
          libc++abi-dev \
          libgl-dev \
          libglu1-mesa-dev \
          libxkbcommon-dev \
          libxcb-xkb-dev \
          libxcb-icccm4-dev \
          libxcb-image0-dev \
          libxcb-keysyms1-dev \
          libxcb-render-util0-dev \
          libxcb-xinerama0-dev \
          libxcb-cursor-dev

    - name: Install Qt 6
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.*'
        cache: true

    - name: Cache vcpkg
      id: cache-vcpkg
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/vcpkg
        key: vcpkg-repo-64e1fbee7d9f40eab5d112aaff648c4dcffe9e47

    - name: Setup vcpkg
      if: steps.cache-vcpkg.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/microsoft/vcpkg.git ${{ github.workspace }}/vcpkg
        cd ${{ github.workspace }}/vcpkg
        git checkout 64e1fbee7d9f40eab5d112aaff648c4dcffe9e47
        ./bootstrap-vcpkg.sh

    - name: Set vcpkg root
      run: echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" >> $GITHUB_ENV

    - name: Cache vcpkg downloads
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/vcpkg/downloads
        key: vcpkg-downloads-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          vcpkg-downloads-

    - name: Cache vcpkg binary archives
      uses: actions/cache@v4
      with:
        path: ~/.cache/vcpkg/archives
        key: vcpkg-archives-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          vcpkg-archives-${{ runner.os }}-

    - name: Cache vcpkg installed packages
      uses: actions/cache@v4
      with:
        path: build/ci/vcpkg_installed
        key: vcpkg-installed-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          vcpkg-installed-${{ runner.os }}-

    - name: Configure CMake (CI preset)
      run: |
        export CC=clang
        export CXX=clang++
        cmake --preset ci

    - name: Build
      run: cmake --build --preset ci -j$(nproc)

    - name: Run tests
      run: ctest --preset ci --output-on-failure

    - name: Upload build artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-linux
        path: build/ci/
        retention-days: 7
        if-no-files-found: ignore

  build-windows:
    name: Build & Test (Windows)
    runs-on: windows-latest
    permissions:
      packages: write
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Ninja
      run: choco install ninja

    - name: Install Qt 6
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.*'
        cache: true
        arch: 'win64_msvc2022_64'

    - name: Cache vcpkg
      id: cache-vcpkg
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}\vcpkg
        key: vcpkg-repo-64e1fbee7d9f40eab5d112aaff648c4dcffe9e47

    - name: Setup vcpkg
      if: steps.cache-vcpkg.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        git clone https://github.com/microsoft/vcpkg.git ${{ github.workspace }}\vcpkg
        cd ${{ github.workspace }}\vcpkg
        git checkout 64e1fbee7d9f40eab5d112aaff648c4dcffe9e47
        .\bootstrap-vcpkg.bat

    - name: Set vcpkg root
      shell: pwsh
      run: echo "VCPKG_ROOT=${{ github.workspace }}\vcpkg" >> $env:GITHUB_ENV

    - name: Cache vcpkg downloads
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}\vcpkg\downloads
        key: vcpkg-downloads-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          vcpkg-downloads-

    - name: Cache vcpkg binary archives
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\vcpkg\archives
        key: vcpkg-archives-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          vcpkg-archives-${{ runner.os }}-

    - name: Cache vcpkg installed packages
      uses: actions/cache@v4
      with:
        path: build\ci\vcpkg_installed
        key: vcpkg-installed-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          vcpkg-installed-${{ runner.os }}-

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure CMake (CI preset)
      run: cmake --preset ci

    - name: Build
      run: cmake --build --preset ci --config Release

    - name: Run tests
      run: ctest --preset ci --output-on-failure -C Release

    - name: Upload build artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-windows
        path: build/ci/
        retention-days: 7
        if-no-files-found: ignore

  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-latest
    permissions:
      packages: write
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install system dependencies
      run: |
        brew install ninja

    - name: Install Qt 6
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.*'
        cache: true

    - name: Cache vcpkg
      id: cache-vcpkg
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/vcpkg
        key: vcpkg-repo-64e1fbee7d9f40eab5d112aaff648c4dcffe9e47

    - name: Setup vcpkg
      if: steps.cache-vcpkg.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/microsoft/vcpkg.git ${{ github.workspace }}/vcpkg
        cd ${{ github.workspace }}/vcpkg
        git checkout 64e1fbee7d9f40eab5d112aaff648c4dcffe9e47
        ./bootstrap-vcpkg.sh

    - name: Set vcpkg root
      run: echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" >> $GITHUB_ENV

    - name: Cache vcpkg downloads
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/vcpkg/downloads
        key: vcpkg-downloads-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          vcpkg-downloads-

    - name: Cache vcpkg binary archives
      uses: actions/cache@v4
      with:
        path: ~/.cache/vcpkg/archives
        key: vcpkg-archives-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          vcpkg-archives-${{ runner.os }}-

    - name: Cache vcpkg installed packages
      uses: actions/cache@v4
      with:
        path: build/ci/vcpkg_installed
        key: vcpkg-installed-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          vcpkg-installed-${{ runner.os }}-

    - name: Configure CMake (CI preset)
      run: cmake --preset ci

    - name: Build
      run: cmake --build --preset ci -j$(sysctl -n hw.ncpu)

    - name: Run tests
      run: ctest --preset ci --output-on-failure

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ runner.os }}
        path: build/ci/Testing/
        retention-days: 14
        if-no-files-found: ignore

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-${{ runner.os }}
        path: |
          build/ci/CMakeFiles/CMakeOutput.log
          build/ci/CMakeFiles/CMakeError.log
          build/ci/**/*.log
        retention-days: 7
        if-no-files-found: ignore

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install clang-format
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format

    - name: Check code formatting
      run: |
        find src tests -name "*.h" -o -name "*.cpp" | xargs clang-format --dry-run --Werror

    - name: Check for trailing whitespace
      run: |
        if git grep -I --line-number -e '[[:blank:]]$' -- '*.cpp' '*.h' '*.cmake' 'CMakeLists.txt'; then
          echo "Error: Found trailing whitespace in the files listed above."
          exit 1
        fi