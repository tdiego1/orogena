name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'

jobs:
  build-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ninja-build \
          clang \
          libc++-dev \
          libc++abi-dev \
          libgl-dev \
          libglu1-mesa-dev \
          libxkbcommon-dev \
          libxcb-xkb-dev \
          libxcb-icccm4-dev \
          libxcb-image0-dev \
          libxcb-keysyms1-dev \
          libxcb-render-util0-dev \
          libxcb-xinerama0-dev \
          libxcb-cursor-dev

    - name: Install Qt 6
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.*'
        cache: true

    - name: Export GitHub Actions cache environment variables
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11

    - name: Configure CMake (CI preset)
      run: |
        export CC=clang
        export CXX=clang++
        cmake --preset ci

    - name: Build
      run: cmake --build --preset ci -j$(nproc)

    - name: Run tests
      run: ctest --preset ci --output-on-failure

    - name: Upload build artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-linux
        path: build/ci/
        retention-days: 7
        if-no-files-found: ignore

  build-windows:
    name: Build & Test (Windows)
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Ninja
      run: choco install ninja

    - name: Install Qt 6
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.*'
        cache: true
        arch: 'win64_msvc2022_64'

    - name: Export GitHub Actions cache environment variables
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure CMake (CI preset)
      run: cmake --preset ci

    - name: Build
      run: cmake --build --preset ci --config Release

    - name: Run tests
      run: ctest --preset ci --output-on-failure -C Release

    - name: Upload build artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-windows
        path: build/ci/
        retention-days: 7
        if-no-files-found: ignore

  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install system dependencies
      run: |
        brew install ninja llvm

    - name: Install Qt 6
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.*'
        cache: true

    - name: Export GitHub Actions cache environment variables
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11

    - name: Configure CMake (CI preset)
      run: |
        export CC=$(brew --prefix llvm)/bin/clang
        export CXX=$(brew --prefix llvm)/bin/clang++
        cmake --preset ci

    - name: Build
      run: cmake --build --preset ci -j$(sysctl -n hw.ncpu)

    - name: Run tests
      run: ctest --preset ci --output-on-failure

    - name: Upload build artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-macos
        path: build/ci/
        retention-days: 7
        if-no-files-found: ignore

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install clang-format
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format

    - name: Check code formatting
      run: |
        find src tests -name "*.h" -o -name "*.cpp" | xargs clang-format --dry-run --Werror

    - name: Check for trailing whitespace
      run: |
        if git grep -I --line-number -e '[[:blank:]]$' -- '*.cpp' '*.h' '*.cmake' 'CMakeLists.txt'; then
          echo "Error: Found trailing whitespace in the files listed above."
          exit 1
        fi
