name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: Orogena v${{ steps.version.outputs.VERSION }}
        draft: false
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-release-artifacts:
    name: Build Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: orogena-linux-x64
            executable: build/release/src/orogena
          - os: windows-latest
            artifact_name: orogena-windows-x64
            executable: build/release/src/Release/orogena.exe
          - os: macos-latest
            artifact_name: orogena-macos-arm64
            executable: build/release/src/orogena

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build clang libc++-dev libc++abi-dev libgl-dev

    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: brew install ninja llvm

    - name: Install Qt 6
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.*'
        modules: 'qtsvg'
        cache: true
        arch: ${{ matrix.os == 'windows-latest' && 'win64_msvc2022_64' || '' }}

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: 'master'

    - name: Setup MSVC (Windows)
      if: matrix.os == 'windows-latest'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure CMake
      run: cmake --preset release

    - name: Build
      run: cmake --build --preset release

    - name: Package (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        mkdir -p package
        cp ${{ matrix.executable }} package/
        cp LICENSE package/
        cp README.md package/
        cd package && tar -czvf ../${{ matrix.artifact_name }}.tar.gz *

    - name: Package (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        mkdir package
        cp ${{ matrix.executable }} package/
        cp LICENSE package/
        cp README.md package/
        Compress-Archive -Path package/* -DestinationPath ${{ matrix.artifact_name }}.zip

    - name: Package (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        mkdir -p package
        cp ${{ matrix.executable }} package/
        cp LICENSE package/
        cp README.md package/
        cd package && tar -czvf ../${{ matrix.artifact_name }}.tar.gz *

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ matrix.artifact_name }}.tar.gz
          ${{ matrix.artifact_name }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
